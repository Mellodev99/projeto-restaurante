<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marmita Top10</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=menu" />
</head>
<body>
    <header>
        
        <h1>Quentinha Top</h1>
        <span class="material-symbols-outlined" id="btn-menu" onclick="toggleMenu()">menu</span>
        <nav>
            <ul id="menu-links">
                <li><a href="#">Comandas</a></li>
                <li><a href="#">Fluxo de Caixa</a></li>
                <li><a href="relatorios.html">Relatórios</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Novo Pedido:</h2>
        <p>Selecione a mesa e adicione os itens do pedido:</p>
        <form action="#" method="post" id="form-pedido">

            <label for="nome" id="inome">Nome do Cliente:</label>
            <input type="text" id="nome" name="nome" required>
            <!-- Seleção da mesa -->
            <label for="mesa">Mesa:</label>
            <select id="mesa" name="mesa">
                <option value="0">Retirada</option>
                <option value="1">Mesa 1</option>
                <option value="2">Mesa 2</option>
                <option value="3">Mesa 3</option>
                <option value="4">Mesa 4</option>
                <option value="5">Mesa 5</option>
            </select>
            <br><br>
                <label for="item">Valor da refeição:</label>

                <input list="itens" id="item" name="item" required placeholder="Selecione uma refeição" autocomplete="on">

                <datalist id="itens">
                    <option value="Refeição R$7,00">
                    <option value="Refeição R$10,00">
                </datalist>
                <br><br>

           <label for="iopcao" class="carnes">Opções de carne:</label> <br>
            <div id="caixa-carnes">
                <label class="item-carne">
                    <input type="checkbox" name="opcao" value="Carne"> Carne
                </label>

                <label class="item-carne" id="ifrango-box">
                    <input type="checkbox" name="opcao" value="Frango" id="ifrango"> Frango
                </label>

                <label class="item-carne">
                    <input type="checkbox" name="opcao" value="Calabresa"> Calabresa
                </label>

                <button type="button" onclick="selecionarcarnes()">
                    Selecionar todos

                </button>
            </div>
               


               <label class="acomp">Acompanhamentos:</label><br>

                <div id="caixa-acompanhamentos">
                    <label class="item-arroz">
                        <input type="checkbox" name="opcao" value="Arroz" class="acomp"> Arroz
                    </label>

                    <label class="item-feijão">
                        <input type="checkbox" name="opcao" value="Feijão" class="acomp"> Feijão
                    </label>

                    <label class="item-macarrao">
                        <input type="checkbox" name="opcao" value="Macarrão" class="acomp"> Macarrão
                    </label>

                    <label class="item-salada">
                        <input type="checkbox" name="opcao" value="Salada" class="acomp"> Salada
                    </label>
                    
                    <button type="button" onclick="selecionarAcompanhamentos()">
                    Selecionar todos
                </button><br>

            </div>
                
                <div id="caixa-bebidas">
                    <!--Sugestões de bebidas-->
                    <label for="ibebidas" id="ibebidas">Bebidas:</label> 

                    <label id="icoca">
                        <input type="checkbox" id="icoca" name="opcao" value="Coca-Cola"> Coca-Cola
                    </label>

                    <label id="isuco">
                        <input type="checkbox" id="isuco" name="opcao" value="Suco de Laranja"> Suco de Laranja
                    </label>

                    <label id="iagua">
                        <input type="checkbox" id="iagua" name="opcao" value="Água Mineral">  Água Mineral
                       
                    </label>
                    <label id="ih2o"">
                        <input type="checkbox"id="ih2o" name="opcao" value="H2O"> H2O
                    </label>

                    <button type="button" onclick="limparBebidas()">
                        Limpar Bebidas
                    </button>
                </div>

         <button type="button" onclick="adicionarItem()">Adicionar Item</button>
         <input type="reset" value="Limpar Pedido">
         <h3>Comanda <span id="numero-comanda">#0001</span></h3>
         <p><strong>Cliente:</strong> <span id="cliente-comanda">-</span></p>
         <p><strong>Mesa:</strong> <span id="mesa-comanda">-</span></p>

            <ul id="lista-comanda"></ul>

            <p><strong>Total: R$ <span id="total">0.00</span></strong></p>
             <button type="button" onclick="fecharPedido()">Fechar Pedido</button>
        </form>
    </main>

  <script>
    // Controle da comanda
    let numeroComanda = 1;
    let total = 0;
    let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

    const cardapio = {
        "Refeição R$7,00": 7,
        "Refeição R$10,00": 10,
        "Coca-Cola": 5,
        "Suco de Laranja": 4,
        "Água Mineral": 3,
        "Carne": 0,
        "Frango": 0,
        "Calabresa": 0,
        "Arroz": 0,
        "Feijão": 0,
        "Macarrão": 0,
        "Salada": 0
    };

    function adicionarItem() {

        const nomeInput = document.getElementById("nome");
        const mesaSelect = document.getElementById("mesa");
        const clienteSpan = document.getElementById("cliente-comanda");
        const mesaSpan = document.getElementById("mesa-comanda");

        // Define cliente e mesa apenas na primeira vez
        if (clienteSpan.textContent === "-") {
            clienteSpan.textContent = nomeInput.value;
            mesaSpan.textContent = mesaSelect.value == "0"
                ? "Retirada"
                : "Mesa " + mesaSelect.value;

            nomeInput.disabled = true;
            mesaSelect.disabled = true;
        }

        const itemInput = document.getElementById("item");
        const lista = document.getElementById("lista-comanda");
        const totalSpan = document.getElementById("total");

        let valor = 0;
        let descricao = "";

        // Refeição principal
        if (cardapio[itemInput.value] !== undefined) {
            valor += cardapio[itemInput.value];
            descricao += itemInput.value;
        }

        // Checkboxes (opções e bebidas)
        const selecionados = document.querySelectorAll('input[name="opcao"]:checked');

        selecionados.forEach(opcao => {
            descricao += (descricao ? " + " : "") + opcao.value;

            if (cardapio[opcao.value] !== undefined) {
                valor += cardapio[opcao.value];
            }
        });

        if (valor === 0) {
            alert("Selecione um item válido!");
            return;
        }

        total += valor;

        const li = document.createElement("li");
        li.textContent = descricao + " = R$ " + valor.toFixed(2);

        lista.appendChild(li);
        totalSpan.textContent = total.toFixed(2);

        // Limpa campos
        itemInput.value = "";
        selecionados.forEach(op => op.checked = false);

        
    }

    function gerarNumeroComanda() {
        const numeroComandaSpan = document.getElementById("numero-comanda");
        numeroComandaSpan.textContent =
            "#" + numeroComanda.toString().padStart(4, "0");
    }

     function selecionarAcompanhamentos() {
        const acompanhamentos = document.querySelectorAll('.acomp , .carnes');

        const  todosMarcados = [...acompanhamentos].every(item =>item.checked);
        // Se todos já estão marcados, desmarca todos. Caso contrário, marca todos.
            if (todosMarcados) {
                acompanhamentos.forEach(acomp => {
                    acomp.checked = false;
                });
                return;
            }

        acompanhamentos.forEach(acomp => {
            acomp.checked = true;
        });
    }

    function selecionarcarnes() {
        const carnes = document.querySelectorAll('.item-carne input[type="checkbox"]');

        const  todosMarcados = [...carnes].every(item =>item.checked);
        // Se todos já estão marcados, desmarca todos. Caso contrário, marca todos.
            if (todosMarcados) {
                carnes.forEach(carne => {
                    carne.checked = false;
                });
                return;
            }

        carnes.forEach(carne => {
            carne.checked = true;
        });
    }




   function fecharPedido() {
    // 1. Verificação inicial: O total global é zero?
    if (total === 0) {
        alert("Nenhum item na comanda!");
        return;
    }

    // 2. Coleta os dados ANTES de limpar a tela
    const cliente = document.getElementById("cliente-comanda").textContent;
    const mesa = document.getElementById("mesa-comanda").textContent;
    const itensHTML = document.getElementById("lista-comanda").innerHTML;
    const valorFinal = total; // Salva o valor atual antes de zerar a variável global

    // 3. Cria o objeto do pedido
    const pedido = {
        numero: "#" + numeroComanda.toString().padStart(4, "0"),
        cliente: cliente,
        mesa: mesa,
        itens: itensHTML,
        total: valorFinal.toFixed(2),
        data: new Date().toLocaleString()
    };

    // 4. Salva no LocalStorage
    let pedidosExistentes = JSON.parse(localStorage.getItem("pedidos")) || [];
    pedidosExistentes.push(pedido);
    localStorage.setItem("pedidos", JSON.stringify(pedidosExistentes));

    // 5. Feedback para o usuário
    alert("Pedido " + pedido.numero + " finalizado e salvo com sucesso!");

    // 6. Reseta o sistema para o próximo cliente
    numeroComanda++;
    total = 0; // Zera a variável global

    // Limpa a interface visual
    document.getElementById("total").textContent = "0.00";
    document.getElementById("lista-comanda").innerHTML = "";
    document.getElementById("nome").disabled = false;
    document.getElementById("mesa").disabled = false;
    document.getElementById("nome").value = "";
    document.getElementById("cliente-comanda").textContent = "-";
    document.getElementById("mesa-comanda").textContent = "-";

    // Atualiza o número visual da próxima comanda
    gerarNumeroComanda();
}

   
    // Gera número inicial ao carregar
    gerarNumeroComanda();

    function toggleMenu() {
    const menu = document.getElementById('menu-links');
    
    // O comando toggle coloca a classe se não existir, e tira se já existir
    menu.classList.toggle('aberto');
}
function limparBebidas() {
    const bebidas = document.querySelectorAll('#caixa-bebidas input[type="checkbox"]');
    bebidas.forEach(bebida => bebida.checked = false);
}

  </script>
</script>



</body>
</html>
