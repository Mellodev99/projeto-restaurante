<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marmita Top10</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=menu" />
    
</head>
<body>
    <header>
    
        <h1>Quentinha Top</h1>
        <span class="material-symbols-outlined" id="btn-menu" onclick="toggleMenu()">menu</span>
        <nav>
            <ul id="menu-links">
                <li><a href="#">Comandas</a></li>
                <li><a href="#">Fluxo de Caixa</a></li>
                <li><a href="relatorios.html">Relatórios</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Novo Pedido:</h2>
        <p>Selecione a mesa e adicione os itens do pedido:</p>
        <form action="#" method="post" id="form-pedido">

            <label for="nome" id="inome">Nome do Cliente:</label>
            <input type="text" id="nome" name="nome" required>
            <!-- Seleção da mesa -->
            <label for="mesa">Mesa:</label>
            <select id="mesa" name="mesa">
                <option value="0">Retirada</option>
                <option value="1">Mesa 1</option>
                <option value="2">Mesa 2</option>
                <option value="3">Mesa 3</option>
                <option value="4">Mesa 4</option>
                <option value="5">Mesa 5</option>
            </select>
            <br><br>
                <label for="item">Valor da refeição:</label>

                <input list="itens" id="item" name="item" required placeholder="Selecione uma refeição" autocomplete="on">

                <datalist id="itens">
                    <option value="Refeição R$7,00">
                    <option value="Refeição R$10,00">
                </datalist>
                <br><br>

           <label for="iopcao" class="carnes">Opções de carne:</label> <br>
            <div id="caixa-carnes">
                <label class="item-carne">
                    <input type="checkbox" name="opcao" value="Carne"> Carne
                </label>

                <label class="item-carne" id="ifrango-box">
                    <input type="checkbox" name="opcao" value="Frango" id="ifrango"> Frango
                </label>

                <label class="item-carne">
                    <input type="checkbox" name="opcao" value="Calabresa"> Calabresa
                </label>

                <button type="button" onclick="selecionarcarnes()">
                    Selecionar todos

                </button>
            </div>
               


               <label class="acomp">Acompanhamentos:</label>

                <div id="caixa-acompanhamentos">
                    <label class="item-arroz">
                        <input type="checkbox" name="opcao" value="Arroz" class="acomp"> Arroz
                    </label>

                    <label class="item-feijão">
                        <input type="checkbox" name="opcao" value="Feijão" class="acomp"> Feijão
                    </label>

                    <label class="item-macarrao">
                        <input type="checkbox" name="opcao" value="Macarrão" class="acomp"> Macarrão
                    </label>

                    <label class="item-salada">
                        <input type="checkbox" name="opcao" value="Salada" class="acomp"> Salada
                    </label>
                    
                    <button type="button" class="botao-adicionar-acompanhamentos" onclick="selecionarAcompanhamentos()">
                    Selecionar todos
                </button>

            </div>

                 <!--Sugestões de bebidas-->
                    <label class="ibebidas">Bebidas:</label> 

                <div id="caixa-bebidas">
                   

                    <label id="icoca">
                        <input type="checkbox" id="icoca" name="opcao" value="Coca-Cola"> Coca-Cola 1L
                    </label>

                     <label id="icoca-lata">
                        <input type="checkbox" id="icoca-lata" name="opcao" value="Coca-Cola"> Coca-Cola 350ml
                    </label>

                    <label id="isuco">
                        <input type="checkbox" id="isuco" name="opcao" value="Suco de Laranja"> Suco 1l
                    </label>

                    <label id="iagua">
                        <input type="checkbox" id="iagua" name="opcao" value="Água Mineral">  Água Mineral
                       
                    </label>
                    <label id="ih2o">
                        <input type="checkbox"id="ih2o" name="opcao" value="H2O"> H2O
                    </label>

                    <button type="button" class="botao-limpar" onclick="limparBebidas()">
                        Limpar Bebidas
                    </button>
                </div>

         <button type="button" onclick="adicionarItem()">Adicionar Item</button>
         <input type="reset" value="Limpar Pedido">
         <h3>Comanda <span id="numero-comanda">#0001</span></h3>
         <p><strong>Cliente:</strong> <span id="cliente-comanda">-</span></p>
         <p><strong>Mesa:</strong> <span id="mesa-comanda">-</span></p>

            <ul id="lista-comanda"></ul>

            <p><strong>Total: R$ <span id="total">0.00</span></strong></p>
             <button type="button" onclick="fecharPedido()">Fechar Pedido</button>
        </form>
    </main>

    <script src="javascript/scripts.js"></script>

</body>
</html>
