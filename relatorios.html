<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios - Quentinha Top</title>
    <link rel="stylesheet" href="estilos/style.css">
</head>
<body>
    <header>
        <h1>Relatório de Vendas</h1>
        <a href="index.html" style="color: white; text-decoration: none;">← Voltar ao Caixa</a>
    </header>

    <main style="max-width: 900px;">
        <div id="resumo-financeiro" style="display: flex; justify-content: space-around; margin-bottom: 20px; background: #2D5A27; color: white; padding: 20px; border-radius: 8px;">
            <div>
                <h3>Total de Pedidos</h3>
                <p id="qtd-pedidos" style="font-size: 1.5rem; font-weight: bold;">0</p>
            </div>
            <div>
                <h3>Faturamento Total</h3>
                <p id="faturamento-total" style="font-size: 1.5rem; font-weight: bold;">R$ 0,00</p>
            </div>
        </div>

        <table style="width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            <thead style="background: #e9ecef; border-bottom: 2px solid #dee2e6;">
                <tr>
                    <th style="padding: 12px;">Comanda</th>
                    <th style="padding: 12px;">Cliente / Mesa</th>
                    <th style="padding: 12px;">Data/Hora</th>
                    <th style="padding: 12px;">Total</th>
                    <th style="padding: 12px;">Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-pedidos" style="text-align: center;">
                </tbody>
        </table>

        <button onclick="limparHistorico()" style="background: #BC4749; margin-top: 30px; width: 100%;">LIMPAR TODO O HISTÓRICO</button>
    </main>

    <script>
        function carregarRelatorios() {
            const pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];
            const tabela = document.getElementById("tabela-pedidos");
            const faturamentoSpan = document.getElementById("faturamento-total");
            const qtdSpan = document.getElementById("qtd-pedidos");

            let faturamento = 0;
            tabela.innerHTML = "";

            pedidos.forEach((pedido, index) => {
                faturamento += parseFloat(pedido.total);
                
                const tr = document.createElement("tr");
                tr.style.borderBottom = "1px solid #eee";
                tr.innerHTML = `
                    <td style="padding: 12px;">${pedido.numero}</td>
                    <td style="padding: 12px;">${pedido.cliente} (${pedido.mesa})</td>
                    <td style="padding: 12px;">${pedido.data}</td>
                    <td style="padding: 12px;"><strong>R$ ${pedido.total}</strong></td>
                    <td style="padding: 12px;">
                        <button onclick="verDetalhes(${index})" style="background: #2D5A27; padding: 5px 10px; font-size: 12px;">Ver Itens</button>
                    </td>
                `;
                tabela.appendChild(tr);
            });

            faturamentoSpan.textContent = `R$ ${faturamento.toFixed(2)}`;
            qtdSpan.textContent = pedidos.length;
        }

        function verDetalhes(index) {
            const pedidos = JSON.parse(localStorage.getItem("pedidos"));
            const pedido = pedidos[index];
            
            // Cria um alerta simples com os itens (que salvamos em HTML)
            const novaJanela = window.open('', '', 'width=400,height=500');
            novaJanela.document.write(`
                <h3>Itens do Pedido ${pedido.numero}</h3>
                <p><strong>Cliente:</strong> ${pedido.cliente}</p>
                <ul>${pedido.itens}</ul>
                <p><strong>Total: R$ ${pedido.total}</strong></p>
            `);
        }

        function limparHistorico() {
            if (confirm("Tem certeza que deseja apagar TODAS as vendas do histórico?")) {
                localStorage.removeItem("pedidos");
                location.reload();
            }
        }

        // Inicia ao carregar a página
        carregarRelatorios();
    </script>
</body>
</html>
